name: Docker PR Build (x64)

on:
  pull_request:

jobs:
  docker-pr-build:
    runs-on: ubuntu-latest
    name: "Quick AMD64 build validation"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@9cd4410b76a77e8054419e70095df406556617a8

      - name: Build regular image (AMD64 only)
        uses: docker/build-push-action@9a57217389f1c89cb7c6bf96972f839d187aaf5b
        with:
          push: false
          context: "{{defaultContext}}"
          file: ./docker/Dockerfile
          platforms: linux/amd64
          tags: fdmmonster/fdm-monster:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
