name: Docker PR Build (x64)

on:
  pull_request:

jobs:
  docker-pr-build:
    runs-on: ubuntu-latest
    name: "Quick AMD64 build validation"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@172dff065fb2e54aaed577fd667975cd412819fb

      - name: Build regular image (AMD64 only)
        uses: docker/build-push-action@502612d46437e573ecd598d11dd0b009741ed5cd
        with:
          push: false
          context: "{{defaultContext}}"
          file: ./docker/Dockerfile
          platforms: linux/amd64
          tags: fdmmonster/fdm-monster:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
