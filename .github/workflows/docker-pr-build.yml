name: Docker PR Build (x64)

on:
  pull_request:

jobs:
  docker-pr-build:
    runs-on: ubuntu-latest
    name: "Quick AMD64 build validation"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8f54c6f8864eed1921d50086061f664945fcc305

      - name: Build regular image (AMD64 only)
        uses: docker/build-push-action@f64672cf50fa6f34ab7b194daf79d0161632a3ae
        with:
          push: false
          context: "{{defaultContext}}"
          file: ./docker/Dockerfile
          platforms: linux/amd64
          tags: fdmmonster/fdm-monster:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
